name: Monthly Symbol Pruning

on:
  schedule:
    - cron: '0 0 1 * *'  # Runs at 00:00 on the 1st of every month
  workflow_dispatch:      # Allows manual trigger

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pruning script
        run: python scripts/update_symbols_with_cap.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add symbols/us-equities.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: monthly symbol pruning [skip ci]"
            git push origin main
          fi
